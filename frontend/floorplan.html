<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CrisisSync - Architectural Floor Plan</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600;700&display=swap"
    rel="stylesheet" />

  <style>
    :root {
      --bg: #1a1a2e;
      --surface-1: #16213e;
      --border-dark: #0f3460;
      --corridor: #0d0d1a;
      --text-muted: #94a3b8;

      --color-room: #3b82f6;
      --color-common: #f59e0b;
      --color-safety: #16a34a;
      --color-parking: #64748b;
    }

    body.theme-evacuate {
      --color-safety: #4ade80;
    }

    body.theme-respond {
      --color-safety: #60a5fa;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Barlow', sans-serif;
    }

    body {
      background: var(--bg);
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    .app-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      background: #111122;
      border-bottom: 2px solid var(--border-dark);
    }

    .app-title {
      font-family: 'Barlow Condensed';
      color: var(--color-common);
      font-size: 24px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .current-floor-lbl {
      font-family: 'Barlow Condensed';
      font-size: 20px;
      color: white;
      letter-spacing: 1px;
    }

    /* Layout */
    .layout-main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 80px;
      background: #111122;
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 12px 8px;
      overflow-y: auto;
      border-right: 2px solid var(--border-dark);
    }

    .floor-btn {
      padding: 12px 0;
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-family: 'Barlow Condensed';
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.2s;
      text-align: center;
    }

    .floor-btn:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .floor-btn.active {
      background: var(--color-common);
      color: white;
    }

    /* Canvas Area */
    .canvas-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
      padding: 24px;
      background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 20px 20px;
      align-items: center;
      justify-content: flex-start;
      overflow-y: auto;
    }

    .svg-wrap {
      width: 100%;
      max-width: 900px;
      position: relative;
      flex-shrink: 0;
    }

    #floor-svg {
      width: 100%;
      height: auto;
      background: var(--corridor);
      border: 3px solid var(--border-dark);
      border-radius: 8px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      transition: opacity 0.3s;
      display: block;
    }

    /* SVG Elements */
    .room {
      fill: var(--surface-1);
      stroke: var(--border-dark);
      stroke-width: 1.5;
      cursor: pointer;
      transition: all 0.2s;
    }

    .room:hover {
      fill: #1f2d50;
    }

    .room.highlight {
      stroke: var(--color-common);
      fill: rgba(245, 158, 11, 0.1);
      stroke-width: 2.5;
    }

    .lbl {
      font-family: 'Barlow Condensed';
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      fill: var(--text-muted);
      pointer-events: none;
    }

    .exit {
      stroke: var(--color-safety);
      fill: rgba(22, 163, 74, 0.1);
      stroke-width: 2;
      animation: glow-green 2s infinite;
    }

    @keyframes glow-green {

      0%,
      100% {
        filter: drop-shadow(0 0 4px var(--color-safety));
      }

      50% {
        filter: drop-shadow(0 0 12px var(--color-safety));
      }
    }

    /* Path Animation */
    .route-path {
      fill: none;
      stroke: var(--color-safety);
      stroke-width: 4;
      stroke-dasharray: 10, 10;
      animation: dash 1s linear infinite;
      filter: drop-shadow(0 0 4px var(--color-safety));
    }

    @keyframes dash {
      to {
        stroke-dashoffset: -20;
      }
    }

    .travel-dot {
      fill: white;
      filter: drop-shadow(0 0 6px var(--color-safety));
    }

    .current-loc-dot {
      fill: #ef4444;
      animation: pulse-red 1.5s infinite;
      filter: drop-shadow(0 0 6px #ef4444);
    }

    @keyframes pulse-red {

      0%,
      100% {
        r: 5;
        opacity: 1;
      }

      50% {
        r: 8;
        opacity: 0.6;
      }
    }

    /* Legend */
    .legend {
      width: 100%;
      max-width: 900px;
      margin-top: 16px;
      background: rgba(17, 17, 34, 0.9);
      padding: 12px 24px;
      border: 1px solid var(--border-dark);
      border-radius: 8px;
      display: flex;
      flex-direction: row;
      justify-content: center;
      gap: 24px;
      flex-shrink: 0;
    }

    .leg-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-family: 'Barlow Condensed';
      letter-spacing: 1px;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .leg-box {
      width: 12px;
      height: 12px;
      border-radius: 2px;
    }

    /* Compass */
    .compass {
      position: absolute;
      top: 24px;
      right: 24px;
      width: 50px;
      height: 50px;
      pointer-events: none;
    }

    /* Instructions Panel */
    .instructions-panel {
      width: 100%;
      max-width: 900px;
      margin-top: 16px;
      background: rgba(17, 17, 34, 0.9);
      border: 1px solid var(--border-dark);
      border-left: 4px solid var(--color-safety);
      border-radius: 8px;
      padding: 16px;
      flex-shrink: 0;
    }

    .inst-title {
      font-family: 'Barlow Condensed';
      text-transform: uppercase;
      color: var(--color-safety);
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .inst-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .inst-list li {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      font-size: 14px;
      color: #e5e5e5;
    }

    .inst-arrow {
      fill: var(--color-safety);
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    /* Tooltip */
    #tooltip {
      position: absolute;
      background: rgba(0, 0, 0, 0.8);
      color: #fff;
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 12px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      border: 1px solid var(--color-common);
      z-index: 100;
    }

    /* ── Crowd Overlay ── */
    @keyframes crowdPulse {
      0%, 100% { opacity: 0.25; }
      50%       { opacity: 0.45; }
    }
    .crowd-overlay-high {
      animation: crowdPulse 1.5s ease-in-out infinite;
    }

    /* --- Mobile Responsiveness --- */
    @media (max-width: 768px) {
      .app-header {
        flex-direction: column;
        align-items: flex-start;
        padding: 16px;
        gap: 12px;
      }
      .header-right {
        width: 100%;
        display: flex;
        justify-content: space-between;
      }
      .main-area {
        flex-direction: column;
      }
      .sidebar {
        width: 100%;
        height: auto;
        max-height: 300px;
        border-right: none;
        border-bottom: 1px solid var(--border-dark);
      }
      .map-container {
        width: 100%;
        flex: 1;
        min-height: 400px;
      }
      .legend {
        flex-direction: column;
        gap: 12px;
        align-items: flex-start;
        padding: 16px;
      }
      .compass {
        top: 12px;
        right: 12px;
        width: 40px;
        height: 40px;
      }
    }
  </style>
</head>

<body>

  <div class="app-header">
    <div class="app-title">GRAND MERIDIAN HOTEL — FLOOR PLAN</div>
    <div class="current-floor-lbl" id="header-floor-lbl">FLOOR G</div>
  </div>

  <div class="layout-main">
    <div class="sidebar" id="floor-selector">
      <!-- Buttons injected by JS -->
    </div>

    <div class="canvas-area">
      <div class="svg-wrap">
        <svg viewBox="0 0 800 500" id="floor-svg">
          <defs>
            <pattern id="hatch" width="8" height="8" patternTransform="rotate(45 0 0)" patternUnits="userSpaceOnUse">
              <line x1="0" y1="0" x2="0" y2="8" stroke="rgba(255,255,255,0.15)" stroke-width="2" />
            </pattern>
            <g id="compass-rose">
              <circle cx="20" cy="20" r="18" fill="none" stroke="var(--border-dark)" stroke-width="2" />
              <path d="M 20 2 L 25 15 L 20 20 Z" fill="var(--color-common)" />
              <path d="M 20 2 L 15 15 L 20 20 Z" fill="var(--text-muted)" />
              <text x="20" y="-4" class="lbl" text-anchor="middle" fill="white">N</text>
            </g>
          </defs>
          <g id="floor-layer"></g>
          <g id="crowd-layer"></g>
          <g id="route-layer"></g>
        </svg>

        <svg class="compass" viewBox="-10 -10 60 60">
          <use href="#compass-rose" />
        </svg>
      </div>

      <div class="legend">
        <div class="leg-item"><div class="leg-box" style="background: var(--color-room);"></div> Guest Room</div>
        <div class="leg-item"><div class="leg-box" style="background: var(--color-common);"></div> Common Area</div>
        <div class="leg-item"><div class="leg-box" style="background: var(--color-safety);"></div> Elevator / Stairs</div>
        <div class="leg-item"><div class="leg-box" style="background: var(--color-parking);"></div> Parking / Utility</div>
      </div>

      <div class="instructions-panel" id="inst-panel" style="display:none;">
        <div class="inst-title">Navigation Instructions</div>
        <ul class="inst-list" id="inst-list"></ul>
      </div>
    </div>
  </div>

  <div id="tooltip"></div>

  <script src="crowdEngine-browser.js"></script>
  <script>
    // Config
    // Gemini is proxied through the server — no API key needed in the browser
    const FLOORS = ['9', '8', '7', '6', '5', '4', '3', '2', '1', 'G', 'B1', 'B2'];

    // URL Params
    const urlParams = new URLSearchParams(window.location.search);
    const pFloor = urlParams.get('floor') || 'G';
    const pRoom = urlParams.get('room');
    const pType = urlParams.get('type') || 'GENERAL';
    const pMode = urlParams.get('mode');

    let currentFloor = pFloor;

    if (pMode === 'evacuate') document.body.classList.add('theme-evacuate');
    else if (pMode === 'respond') document.body.classList.add('theme-respond');

    // UI Setup
    const selector = document.getElementById('floor-selector');
    FLOORS.forEach(f => {
      const btn = document.createElement('div');
      btn.className = `floor-btn ${f === currentFloor ? 'active' : ''}`;
      btn.textContent = f;
      btn.onclick = () => loadFloor(f);
      selector.appendChild(btn);
    });

    const floorLayer = document.getElementById('floor-layer');
    const routeLayer = document.getElementById('route-layer');
    const tooltip = document.getElementById('tooltip');

    // Tooltip listeners
    document.addEventListener('mouseover', e => {
      if (e.target.classList.contains('room-hitbox')) {
        const name = e.target.getAttribute('data-name');
        if (name) {
          tooltip.textContent = name;
          tooltip.style.opacity = 1;
        }
      }
    });
    document.addEventListener('mousemove', e => {
      if (tooltip.style.opacity === '1') {
        tooltip.style.left = e.pageX + 10 + 'px';
        tooltip.style.top = e.pageY + 10 + 'px';
      }
    });
    document.addEventListener('mouseout', e => {
      if (e.target.classList.contains('room-hitbox')) tooltip.style.opacity = 0;
    });

    // SVG Generators
    function drawRoom(x, y, w, h, name, type, door = 'none', id = '') {
      let color = 'var(--color-room)';
      if (type === 'common') color = 'var(--color-common)';
      if (type === 'safety') color = 'var(--color-safety)';
      if (type === 'parking') color = 'var(--color-parking)';

      let doorHtml = '';
      if (door === 'N') {
        doorHtml = `
          <line x1="${x + 10}" y1="${y}" x2="${x + 25}" y2="${y}" stroke="var(--surface-1)" stroke-width="3"/>
          <path d="M ${x + 10} ${y + 15} A 15 15 0 0 0 ${x + 25} ${y}" fill="none" stroke="var(--text-muted)" stroke-width="1.5" stroke-dasharray="2,2"/>
          <line x1="${x + 10}" y1="${y}" x2="${x + 10}" y2="${y + 15}" stroke="white" stroke-width="2" stroke-linecap="round"/>
        `;
      } else if (door === 'S') {
        doorHtml = `
          <line x1="${x + 10}" y1="${y + h}" x2="${x + 25}" y2="${y + h}" stroke="var(--surface-1)" stroke-width="3"/>
          <path d="M ${x + 10} ${y + h - 15} A 15 15 0 0 1 ${x + 25} ${y + h}" fill="none" stroke="var(--text-muted)" stroke-width="1.5" stroke-dasharray="2,2"/>
          <line x1="${x + 10}" y1="${y + h}" x2="${x + 10}" y2="${y + h - 15}" stroke="white" stroke-width="2" stroke-linecap="round"/>
        `;
      }

      return `
        <g id="room-${id}">
          <rect x="${x}" y="${y}" width="${w}" height="${h}" class="room"/>
          <rect x="${x}" y="${y}" width="4" height="${h}" fill="${color}"/>
          ${doorHtml}
          <text x="${x + w / 2}" y="${y + h / 2 + 4}" class="lbl" text-anchor="middle">${name}</text>
          <!-- Invisible hitbox for tooltip to prevent flicker over text/doors -->
          <rect x="${x}" y="${y}" width="${w}" height="${h}" fill="transparent" class="room-hitbox" data-name="${name}"/>
        </g>
      `;
    }

    function drawStairs(x, y, w, h, name) {
      return `
        <g data-name="${name}">
          <rect x="${x}" y="${y}" width="${w}" height="${h}" fill="url(#hatch)" stroke="var(--border-dark)" stroke-width="1.5"/>
          <rect x="${x}" y="${y}" width="4" height="${h}" fill="var(--color-safety)"/>
          <rect x="${x + w / 2 - 10}" y="${y + h / 2 - 10}" width="20" height="20" fill="var(--bg)"/>
          <text x="${x + w / 2}" y="${y + h / 2 + 4}" class="lbl" text-anchor="middle" fill="white">S</text>
        </g>
      `;
    }

    function drawElevator(x, y, w, h, name) {
      const cx = x + w / 2;
      const cy = y + h / 2;
      return `
        <g data-name="${name}">
          <rect x="${x}" y="${y}" width="${w}" height="${h}" fill="#111122" stroke="var(--border-dark)" stroke-width="1.5"/>
          <rect x="${x}" y="${y}" width="4" height="${h}" fill="var(--color-safety)"/>
          <path d="M ${cx - 4} ${cy - 10} L ${cx} ${cy - 14} L ${cx + 4} ${cy - 10} M ${cx - 4} ${cy - 2} L ${cx} ${cy + 2} L ${cx + 4} ${cy - 2}" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/>
          <text x="${cx}" y="${cy + 14}" class="lbl" font-size="10px" text-anchor="middle" fill="rgba(255,255,255,0.8)">ELEVATOR</text>
        </g>
      `;
    }

    function drawExit(x, y, w, h, name) {
      return `
        <g data-name="${name}">
          <rect x="${x}" y="${y}" width="${w}" height="${h}" class="exit"/>
          <text x="${x + w / 2}" y="${y + h / 2 + 4}" class="lbl" text-anchor="middle" fill="var(--color-safety)">EXIT</text>
        </g>
      `;
    }

    function getB2() {
      return `
        ${drawRoom(100, 100, 600, 300, 'PARKING B2', 'parking', 'none', 'PARKING')}
        ${drawRoom(300, 50, 200, 50, 'UTILITY / HVAC', 'common', 'S', 'UTILITY')}
        ${drawElevator(350, 200, 100, 100, 'Main Elevators')}
        ${drawStairs(50, 220, 50, 60, 'West Staircase')}
        ${drawStairs(700, 220, 50, 60, 'East Staircase')}
      `;
    }

    function getB1() {
      return `
        ${drawRoom(100, 150, 600, 250, 'PARKING B1', 'parking', 'none', 'PARKING')}
        ${drawRoom(100, 50, 150, 100, 'STAFF LOCKERS', 'common', 'S', 'LOCKERS')}
        ${drawRoom(250, 50, 150, 100, 'LAUNDRY', 'common', 'S', 'LAUNDRY')}
        ${drawRoom(400, 50, 300, 100, 'STORAGE', 'common', 'S', 'STORAGE')}
        ${drawElevator(350, 200, 100, 100, 'Main Elevators')}
        ${drawStairs(50, 220, 50, 60, 'West Staircase')}
        ${drawStairs(700, 220, 50, 60, 'East Staircase')}
      `;
    }

    function getGround() {
      return `
        <!-- Entrance Indicator -->
        <path d="M 350 480 L 450 480" stroke="var(--text-muted)" stroke-width="2" stroke-dasharray="4,4"/>
        <text x="400" y="495" class="lbl" text-anchor="middle">MAIN ENTRANCE</text>

        ${drawRoom(250, 150, 300, 200, 'LOBBY', 'common', 'none', 'LOBBY')}
        ${drawRoom(300, 150, 200, 50, 'RECEPTION', 'common', 'none', 'RECEPTION')}
        ${drawRoom(550, 100, 150, 250, 'RESTAURANT', 'common', 'N', 'RESTAURANT')}
        ${drawRoom(100, 100, 150, 250, 'BAR / LOUNGE', 'common', 'N', 'BAR')}
        
        ${drawElevator(350, 80, 100, 60, 'Main Elevators')}
        ${drawStairs(50, 240, 50, 60, 'West Staircase')}
        ${drawStairs(700, 240, 50, 60, 'East Staircase')}
        ${drawExit(350, 10, 100, 40, 'Emergency Exit North')}
      `;
    }

    function getFloor1() {
      return `
        ${drawRoom(100, 50, 230, 170, 'CLUBHOUSE', 'common', 'S', 'CLUBHOUSE')}
        ${drawRoom(470, 50, 230, 170, 'GYM', 'common', 'S', 'GYM')}
        ${drawRoom(470, 280, 230, 170, 'POOL & SPA', 'common', 'N', 'POOL')}
        
        ${drawElevator(350, 180, 100, 40, 'Elevators')}
        ${drawStairs(50, 220, 40, 60, 'West Staircase')}
        ${drawStairs(710, 220, 40, 60, 'East Staircase')}
        ${drawExit(10, 230, 40, 40, 'Exit West')}
        ${drawExit(750, 230, 40, 40, 'Exit East')}
      `;
    }

    function getGuestFloor(f) {
      let count = f === '9' ? 6 : 12; // Top floor has fewer, larger suites
      let svg = '';
      // Top rooms
      for (let i = 0; i < count; i++) {
        let rn = f * 100 + i + 1;
        let x = 100 + i * 50;
        svg += drawRoom(x, 80, 50, 140, rn.toString(), 'room', 'S', rn);
      }
      // Bottom rooms
      for (let i = 0; i < count; i++) {
        let rn = f * 100 + count + i + 1;
        let x = 100 + i * 50;
        svg += drawRoom(x, 280, 50, 140, rn.toString(), 'room', 'N', rn);
      }
      svg += `
        ${drawElevator(350, 220, 100, 60, 'Main Elevators')}
        ${drawStairs(50, 220, 50, 60, 'West Staircase')}
        ${drawStairs(700, 220, 50, 60, 'East Staircase')}
      `;
      return svg;
    }

    function getFloorSVG(f) {
      if (f === 'B2') return getB2();
      if (f === 'B1') return getB1();
      if (f === 'G') return getGround();
      if (f === '1') return getFloor1();
      return getGuestFloor(f);
    }

    // Load and Render
    function loadFloor(f) {
      currentFloor = f;
      document.getElementById('header-floor-lbl').textContent = `FLOOR ${f}`;
      
      document.querySelectorAll('.floor-btn').forEach(btn => {
        btn.classList.toggle('active', btn.textContent === f);
      });
      
      const svgEl = document.getElementById('floor-svg');
      svgEl.style.opacity = 0;
      setTimeout(() => {
        floorLayer.innerHTML = getFloorSVG(f);
        routeLayer.innerHTML = '';
        svgEl.style.opacity = 1;
        drawOverlay();
        drawCrowdOverlay();
      }, 300);
    }

    // Navigation overlay
    function drawOverlay() {
      if(currentFloor !== pFloor || !pRoom || !pMode) return;
      const targetGroup = document.getElementById(`room-${pRoom.toUpperCase()}`);
      if(!targetGroup) return;

      const rect = targetGroup.querySelector('.room');
      rect.classList.add('highlight');
      
      const tx = parseFloat(rect.getAttribute('x')) + parseFloat(rect.getAttribute('width'))/2;
      const ty = parseFloat(rect.getAttribute('y')) + parseFloat(rect.getAttribute('height'))/2;

      let coords = [];
      if (pMode === 'evacuate') {
        const exitX = tx < 400 ? 50 : 750;
        coords = [{x: tx, y: ty}, {x: tx, y: 250}, {x: exitX, y: 250}];
        
        // Current location dot in the room
        const locDot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        locDot.setAttribute('cx', tx); locDot.setAttribute('cy', ty);
        locDot.setAttribute('class', 'current-loc-dot');
        routeLayer.appendChild(locDot);
      } else if (pMode === 'respond') {
        coords = [{x: 400, y: 250}, {x: tx, y: 250}, {x: tx, y: ty}];
      }

      if(coords.length) {
        const d = coords.map((c, i) => (i===0?'M':'L') + `${c.x},${c.y}`).join(' ');
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', d);
        path.setAttribute('class', 'route-path');
        routeLayer.appendChild(path);

        const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        dot.setAttribute('r', '5');
        dot.setAttribute('class', 'travel-dot');
        const anim = document.createElementNS('http://www.w3.org/2000/svg', 'animateMotion');
        anim.setAttribute('dur', '3s');
        anim.setAttribute('repeatCount', 'indefinite');
        anim.setAttribute('path', d);
        dot.appendChild(anim);
        routeLayer.appendChild(dot);
      }
    }

    // ── Crowd Density Overlay ──────────────────────────────────────────
    function drawCrowdOverlay() {
      const crowdLayer = document.getElementById('crowd-layer');
      if (!crowdLayer) return;
      crowdLayer.innerHTML = ''; // clear previous overlays

      if (!window.CrowdEngine) return;
      const zones = window.CrowdEngine.getZones();

      zones.forEach(zone => {
        // Only render zones matching the current floor
        if (zone.floor !== currentFloor) return;

        // Find the SVG group by the id set in drawRoom()
        const group = document.getElementById(`room-${zone.location}`);
        if (!group) return;

        const rect = group.querySelector('.room');
        if (!rect) return;

        const x = parseFloat(rect.getAttribute('x'));
        const y = parseFloat(rect.getAttribute('y'));
        const w = parseFloat(rect.getAttribute('width'));
        const h = parseFloat(rect.getAttribute('height'));

        // Tint colour by risk level
        let fillColor;
        if (zone.riskLevel === 'HIGH')   fillColor = 'rgba(220,38,38,0.35)';
        else if (zone.riskLevel === 'MEDIUM') fillColor = 'rgba(245,158,11,0.25)';
        else                              fillColor = 'rgba(22,163,74,0.15)';

        // Tint rectangle
        const ns = 'http://www.w3.org/2000/svg';
        const overlay = document.createElementNS(ns, 'rect');
        overlay.setAttribute('x', x);
        overlay.setAttribute('y', y);
        overlay.setAttribute('width', w);
        overlay.setAttribute('height', h);
        overlay.setAttribute('fill', fillColor);
        overlay.setAttribute('pointer-events', 'none');
        if (zone.riskLevel === 'HIGH') {
          overlay.classList.add('crowd-overlay-high');
        }
        crowdLayer.appendChild(overlay);

        // Density label: "43 👥"
        const label = document.createElementNS(ns, 'text');
        label.setAttribute('x', x + w - 6);
        label.setAttribute('y', y + 14);
        label.setAttribute('text-anchor', 'end');
        label.setAttribute('font-size', '10');
        label.setAttribute('fill', 'white');
        label.setAttribute('pointer-events', 'none');
        label.setAttribute('font-family', 'Barlow, sans-serif');
        label.textContent = `${zone.density} \uD83D\uDC65`;
        crowdLayer.appendChild(label);
      });
    }

    // Gemini Instructions (proxied through server)
    async function generateInstructions() {
      if (!pMode || !pRoom) return;
      
      const panel = document.getElementById('inst-panel');
      const list = document.getElementById('inst-list');
      panel.style.display = 'block';
      list.innerHTML = '<li><svg class="inst-arrow" viewBox="0 0 24 24"><path d="M12 2v20M12 2l-6 6M12 2l6 6"/></svg> <span>Calculating optimal route using AI...</span></li>';

      try {
        const res = await fetch('/api/ai/navigate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ mode: pMode, type: pType, room: pRoom, floor: pFloor })
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.error || 'Navigation failed');

        list.innerHTML = '';
        data.steps.forEach(step => {
          list.innerHTML += `<li><svg class="inst-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg> <span>${step}</span></li>`;
        });
      } catch (e) {
        list.innerHTML = '<li><svg class="inst-arrow" viewBox="0 0 24 24"><path d="M12 2v20M12 2l-6 6M12 2l6 6"/></svg> <span style="color:#ef4444;">Route generation failed. Please follow physical exit signs.</span></li>';
      }
    }

    // Init
    loadFloor(currentFloor);
    if (pMode) generateInstructions();

    // Crowd Engine — start simulation and refresh overlay on every update
    if (window.CrowdEngine) {
      window.CrowdEngine.start();
      window.CrowdEngine.onUpdate(drawCrowdOverlay);
    }

  </script>
  <script src="nav-menu.js"></script>
</body>
</html>
